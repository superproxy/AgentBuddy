name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 tag 触发
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 创建 Release 需要写权限

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build-only

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install flask pyyaml requests pywebview pyinstaller

      - name: Build app + dist package
        run: python build.py --clean --version ${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/installer/AgentBuddy-*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build-only

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install flask pyyaml requests pywebview pyinstaller

      - name: Build app + installer
        run: python build.py --clean --version ${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/installer/AgentBuddy-*

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentBuddy ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/macos-dist/*
            artifacts/windows-dist/*
