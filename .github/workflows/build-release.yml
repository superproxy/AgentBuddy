name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 tag 触发
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            # strip 'v' prefix: v1.0.0 -> 1.0.0
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build-only

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install flask pyyaml requests pywebview pyinstaller

      - name: Build app + dist package
        run: python build.py --clean --version ${{ steps.ver.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/installer/AdeBuddy-*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          # Verify ISCC.exe is accessible
          $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($iscc) {
            $dir = $iscc.DirectoryName
            echo "C:\Program Files (x86)\Inno Setup 6" >> $GITHUB_PATH
            echo "Found ISCC: $($iscc.FullName)"
          } else {
            echo "ISCC not found in standard locations"
          }

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build-only

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install flask pyyaml requests pywebview pyinstaller

      - name: Build app + installer
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py --clean --version ${{ steps.ver.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/installer/AdeBuddy-*

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AdeBuddy ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/macos-dist/*
            artifacts/windows-dist/*
