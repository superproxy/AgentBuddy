name: frontend-design
version: 1.0.0
description: 前端设计插件 - 提供 UI/UX 设计和前端开发能力
author: MyAgentPlugin
mcpServers:
  mastergo:
    command: npx
    args:
      - -y
      - '@mastergo/vibe-mcp'
      - '--url=http://localhost:50678'
    disabled: true
  mastergo-magic-mcp:
    command: npx
    args:
      - -y
      - '@mastergo/magic-mcp'
      - '--token='
      - '--url=https://mastergo.com'
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    disabled: true
  stitch:
    type: http
    url: https://stitch.googleapis.com/mcp
    headers:
      X-Goog-Api-Key: ''
    disabled: true
skills:
  - { name: stitch-prototype-skill, source: superproxy/skills, description: Stitch 原型生成 }
  - { name: design-taste-frontend, source: superproxy/skills, description: 前端设计品味提升 }
  - { name: high-end-visual-design, source: superproxy/skills, description: 高端视觉设计 }
  - { name: redesign-existing-projects, source: superproxy/skills, description: 已有项目重构改进 }
  - { name: ui-ux-pro-max, source: superproxy/skills, description: UX 设计规范强化 }
  - { name: frontend-design, source: superproxy/skills, description: 前端设计能力 }
  - { name: mastergo-magic-skill, source: superproxy/skills, description: MasterGo 设计稿协作 }
  - { name: prd-to-mastergo-interaction-skill, source: superproxy/skills, description: PRD 到交互原型 }
  - { name: mermaid-sequence-from-flow, source: superproxy/skills, description: 流程转序列图 }
