name: arch
version: 1.0.0
description: 架构与生产力插件 - 提供需求分析、任务规划、项目管理、Superpowers 完整技能集
author: AdeBuddy
mcpServers:
  yuque-mcp:
    command: npx
    args:
      - -y
      - yuque-mcp
      - start
      - '--token='
      - '--client=vscode'
    env:
      YUQUE_TOKEN: ''
    disabled: true
  tavily-mcp:
    command: npx
    args:
      - -y
      - tavily-mcp@latest
    env:
      TAVILY_API_KEY: ''
      DEFAULT_PARAMETERS: '{"include_images": true, "max_results": 15, "search_depth": "advanced"}'
    disabled: true
  amap-maps-mcp:
    command: npx
    args:
      - -y
      - '@amap/amap-maps-mcp-server'
    env:
      AMAP_MAPS_API_KEY: ''
    disabled: false
skills:
  # ===== 需求与规划 =====
  - { name: task-plan-skill, source: task-plan-skill, description: 任务拆解与排期 }
  - { name: weekly-report-skill, source: weekly-report-skill, description: 周报/月报生成 }
  - { name: bid-to-tender-skill, source: bid-to-tender-skill, description: 投标书生成 }
