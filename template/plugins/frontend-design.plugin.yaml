name: frontend-design
version: 1.0.0
description: 前端设计插件 - 提供 UI/UX 设计和前端开发能力
author: AgentBuddy
mcpServers:
  mastergo:
    command: npx
    args:
      - -y
      - '@mastergo/vibe-mcp'
      - '--url=http://localhost:50678'
    disabled: true
  mastergo-magic-mcp:
    command: npx
    args:
      - -y
      - '@mastergo/magic-mcp'
      - '--token='
      - '--url=https://mastergo.com'
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    disabled: true
  stitch:
    type: http
    url: https://stitch.googleapis.com/mcp
    headers:
      X-Goog-Api-Key: ''
    disabled: true
skills:
  - { name: stitch-prototype-skill, source: stitch-prototype-skill, description: Stitch 原型生成 }
  - { name: design-taste-frontend, source: leonxlnx/taste-skill@design-taste-frontend, description: 前端设计品味提升 }
  - { name: high-end-visual-design, source: leonxlnx/taste-skill@high-end-visual-design, description: 高端视觉设计 }
  - { name: redesign-existing-projects, source: leonxlnx/taste-skill@redesign-existing-projects, description: 已有项目重构改进 }
  - { name: ui-ux-pro-max, source: nextlevelbuilder/ui-ux-pro-max-skill@ui-ux-pro-max, description: UX 设计规范强化 }
  - { name: frontend-design, source: anthropics/skills@frontend-design, description: 前端设计能力 }
  - { name: mastergo-magic-skill, source: mastergo-magic-skill, description: MasterGo 设计稿协作 }
  - { name: prd-to-mastergo-interaction-skill, source: prd-to-mastergo-interaction-skill, description: PRD 到交互原型 }
  - { name: mermaid-sequence-from-flow, source: mermaid-sequence-from-flow, description: 流程转序列图 }
