_description: MCP 配置模板 - 复制为 mcp.yaml 并填入真实密钥。mcpServers 为服务定义（含 "" 占位符），mcp 为密钥明文。此文件可安全提交到版本控制。
mcpServers:
  12306-mcp:
    args:
    - -y
    - 12306-mcp
    command: npx
    disabled: false
  BOSS直聘:
    args:
    - -y
    - mcp-boss-zp
    command: npx
    disabled: false
    env:
      BST: ""
      COOKIE: ""
  Redis:
    args:
    - -e
    - REDIS_URL="redis://localhost:6379"
    - --
    - npx
    - '@modelcontextprotocol/server-redis'
    command: redis
    disabled: false
  amap-maps-mcp:
    args:
    - -y
    - '@amap/amap-maps-mcp-server'
    command: npx
    disabled: false
    env:
      AMAP_MAPS_API_KEY: ""
  arxiv-paper-mcp:
    args:
    - -y
    - '@langgpt/arxiv-paper-mcp@latest'
    command: npx
    disabled: false
    env: {}
  context7:
    disabled: false
    headers:
      CONTEXT7_API_KEY: ""
    type: http
    url: https://mcp.context7.com/mcp
  elevenlabs:
    args:
    - elevenlabs-mcp
    command: uvx
    disabled: false
    env:
      ELEVENLABS_API_KEY: ""
  filesystem:
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - ./
    command: npx
    env: {}
  everything-mcp:
    args:
      - -y
      - everything-mcp
    command: uvx
    disabled: false
  firecrawl-mcp:
    args:
    - -y
    - firecrawl-mcp
    command: npx
    disabled: true
    env:
      FIRECRAWL_API_KEY: ""
  mastergo:
    args:
    - -y
    - '@mastergo/vibe-mcp'
    - --url=http://localhost:50678
    command: npx
    disabled: false
  mastergo-magic-mcp:
    args:
    - -y
    - '@mastergo/magic-mcp'
    - --token=""
    - --url=https://mastergo.com
    command: npx
    disabled: false
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  my-rag:
    args:
    - mcp-rag
    - serve
    command: uvx
    disabled: true
    env:
      OPENAI_API_KEY: ""
      OPENAI_BASE: ""
      OPENAI_EMBEDDING_MODEL: ""
    startupTimeout: 10000
    type: streamableHttp
    url: http://localhost:8060/mcp
  open-computer-use:
    args:
    - mcp
    command: open-computer-use
  openaiDeveloperDocs:
    disabled: false
    url: https://developers.openai.com/mcp
  playwright:
    args:
    - '@playwright/mcp@latest'
    command: npx
    disabled: false
    name: playwright
  seedance-mcp-server:
    args:
    - seedance-mcp-server
    command: uvx
    disabled: false
    env:
      DOUBAO_API_KEY: ""
      DOUBAO_BASE_URL: ""
      DOUBAO_MODEL: ""
  stitch:
    disabled: false
    headers:
      X-Goog-Api-Key: ""
    type: http
    url: https://stitch.googleapis.com/mcp
  tavily-mcp:
    args:
    - -y
    - tavily-mcp@latest
    command: npx
    disabled: false
    env:
      DEFAULT_PARAMETERS: '{"include_images": true, "max_results": 15, "search_depth":
        "advanced"}'
      TAVILY_API_KEY: ""
  undoom-douyin-data-analysis:
    args:
    - --index-url
    - https://pypi.tuna.tsinghua.edu.cn/simple
    - --from
    - undoom-douyin-data-analysis
    - undoom-douyin-mcp
    command: uvx
    disabled: false
  volc-speech:
    args:
    - --from
    - mcp-server-speech
    - mcp-server-speech
    command: uvx
    disabled: false
    env:
      VOLC_APPID: ""
      VOLC_CLUSTER: ""
      VOLC_TOKEN: ""
      VOLC_VOICE_TYPE: ""
  wecom:
    args:
    - wecom-bot-mcp-server
    command: uvx
    disabled: false
    env:
      WECOM_WEBHOOK_URL: ""
  yuque-mcp:
    args:
    - -y
    - yuque-mcp
    - start
    - --token=""
    - --client=vscode
    command: npx
    disabled: false
    env:
      YUQUE_TOKEN: ""
  zread:
    disabled: false
    headers:
      Authorization: Bearer ""
    type: streamableHttp
    url: https://open.bigmodel.cn/api/mcp/zread/mcp
